name: Nova release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release para deploy (ex: v1.8.6)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy on self-hosted runner
    runs-on: self-hosted

    env:
      APP_DIR: ${{ vars.APP_DIR }}
      APP_IMAGE: ${{ vars.APP_IMAGE }}
      IMAGE_TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
      SERVICE: web

    steps:
      - name: Login on GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout release tag on deployment directory
        working-directory: ${{ env.APP_DIR }}
        run: |
          git config --global --add safe.directory "${{ env.APP_DIR }}"
          git fetch --tags origin
          git checkout -f "${{ env.IMAGE_TAG }}"

      - name: Build and publish release image
        working-directory: ${{ env.APP_DIR }}
        run: |
          IMAGE_REPO="${APP_IMAGE:-ghcr.io/g2bc/lumm-web}"
          docker build \
            --build-arg VITE_API_URL="${{ secrets.VITE_API_URL }}" \
            --build-arg VITE_API_KEY="${{ secrets.VITE_API_KEY }}" \
            --build-arg VITE_ROBOTS="${{ secrets.VITE_ROBOTS }}" \
            --build-arg VITE_SITE_URL="${{ secrets.VITE_SITE_URL }}" \
            --build-arg VITE_PUBLIC_STORAGE_BASE_URL="${{ secrets.VITE_PUBLIC_STORAGE_BASE_URL }}" \
            --build-arg VITE_CLARITY_ID="${{ secrets.VITE_CLARITY_ID }}" \
            -t "${IMAGE_REPO}:${IMAGE_TAG}" \
            -t "${IMAGE_REPO}:latest" \
            .
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
          docker push "${IMAGE_REPO}:latest"

      - name: Update image and restart container
        working-directory: ${{ env.APP_DIR }}
        run: |
          IMAGE_REPO="${APP_IMAGE:-ghcr.io/g2bc/lumm-web}"
          APP_IMAGE="${IMAGE_REPO}" IMAGE_TAG="${IMAGE_TAG}" \
            docker compose up -d --no-deps --pull always --wait --wait-timeout 120 "$SERVICE"

      - name: Show logs on failure
        if: failure()
        working-directory: ${{ env.APP_DIR }}
        run: |
          docker compose ps
          docker compose logs --tail=200 "$SERVICE" || true

      - name: Clean up old images
        run: docker image prune -f
