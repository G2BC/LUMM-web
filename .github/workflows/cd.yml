name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release para build/push (ex: v1.8.6)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Normalize GHCR owner
        id: image_meta
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        run: git checkout -f "${{ steps.meta.outputs.tag }}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image_meta.outputs.owner }}/lumm-web:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ steps.image_meta.outputs.owner }}/lumm-web:${{ github.sha }}
            ghcr.io/${{ steps.image_meta.outputs.owner }}/lumm-web:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_API_KEY=${{ secrets.VITE_API_KEY }}
            VITE_ROBOTS=${{ secrets.VITE_ROBOTS }}
            VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}
            VITE_PUBLIC_STORAGE_BASE_URL=${{ secrets.VITE_PUBLIC_STORAGE_BASE_URL }}
            VITE_CLARITY_ID=${{ secrets.VITE_CLARITY_ID }}
